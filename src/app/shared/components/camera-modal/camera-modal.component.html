<ng-container *ngIf="isOpen">

  <!-- ── Overlay sombre ── -->
  <div class="cam-overlay" (click)="close()"></div>

  <!-- ── Modal box ── -->
  <div class="cam-modal-box">

    <!-- Header -->
    <div class="cam-header">
      <div class="cam-header-left">
        <div class="cam-header-dot"></div>
        <span class="cam-header-title">Caméra</span>
      </div>
      <div class="cam-header-right">
        <!-- Retourner caméra (mobile) -->
        <button class="cam-ctrl-btn" *ngIf="isMobile" (click)="flipCamera()"
                title="Retourner la caméra">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" viewBox="0 0 24 24">
            <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
          </svg>
        </button>
        <!-- Fermer -->
        <button class="cam-ctrl-btn cam-ctrl-close" (click)="close()" title="Fermer">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"
               viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── Zone vidéo ── -->
    <div class="cam-video-area">

      <!-- Chargement -->
      <div class="cam-loading" *ngIf="!isReady && !error">
        <div class="cam-loading-ring"></div>
        <p>Activation de la caméra…</p>
      </div>

      <!-- Erreur -->
      <div class="cam-error" *ngIf="error">
        <svg width="36" height="36" fill="none" stroke="var(--coral,#E8532A)"
             stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p>{{ error }}</p>
        <button class="cam-retry-btn" (click)="startCamera()">Réessayer</button>
      </div>

      <!-- Flux vidéo -->
      <div class="cam-video-wrap" [class.cam-hidden]="!isReady">

        <!-- Viseur (viewfinder) -->
        <div class="cam-viewfinder">
          <div class="vf-corner vf-tl"></div>
          <div class="vf-corner vf-tr"></div>
          <div class="vf-corner vf-bl"></div>
          <div class="vf-corner vf-br"></div>
          <!-- Ligne de scan animée -->
          <div class="vf-scan-line"></div>
        </div>

        <!-- Vidéo live -->
        <video #videoEl class="cam-video" autoplay playsinline
               [style.transform]="facingMode==='user' ? 'scaleX(-1)' : 'none'">
        </video>

        <!-- ── Obturateur overlay (lames) ── -->
        <div class="cam-shutter-overlay" *ngIf="shutterAnim">
          <div class="cam-blade" *ngFor="let b of [0,1,2,3,4,5,6,7]"
               [style.transform]="'rotate(' + (b * 45) + 'deg)'">
          </div>
        </div>

        <!-- Flash blanc -->
        <div class="cam-flash"></div>

      </div>

      <!-- Canvas caché pour la capture -->
      <canvas #canvasEl style="display:none"></canvas>
    </div>

    <!-- ── Contrôles bas ── -->
    <div class="cam-controls" *ngIf="isReady && !error">

      <!-- Choisir dans la galerie -->
      <button class="cam-gallery-btn" (click)="close()"
              title="Fermer et choisir depuis la galerie">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>

      <!-- Bouton CAPTURE central -->
      <button class="cam-capture-btn" (click)="capture()"
              [disabled]="shutterAnim"
              title="Prendre la photo">
        <div class="ccb-outer">
          <div class="ccb-inner">
            <!-- Lames décoratives sur le bouton -->
            <div class="ccb-blades">
              <div class="ccb-blade" *ngFor="let b of [0,1,2,3,4,5]"
                   [style.transform]="'rotate(' + (b*60) + 'deg)'">
              </div>
            </div>
            <div class="ccb-lens">
              <svg width="22" height="22" fill="none" stroke="white" stroke-width="2"
                   stroke-linecap="round" viewBox="0 0 24 24">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
            </div>
          </div>
        </div>
      </button>

      <!-- Placeholder droite pour centrer le bouton capture -->
      <div style="width:44px"></div>
    </div>

    <!-- Aide -->
    <p class="cam-hint" *ngIf="isReady">
      Cadrez le problème et appuyez sur le bouton pour capturer
    </p>

  </div>
</ng-container>
