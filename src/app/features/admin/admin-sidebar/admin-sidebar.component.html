<aside class="admin-sidebar">
  <!-- Logo -->
  <div class="sb-logo">
    <div class="sb-logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C8.134 2 5 5.134 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.866-3.134-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z" fill="white"/>
      </svg>
    </div>
    <span class="sb-logo-text">Madina</span>
    <span class="sb-admin-badge">Admin</span>
  </div>

  <!-- Nav -->
  <nav class="sb-nav">
    <div class="sb-section" *ngFor="let section of sections">
      <div class="sb-section-label">{{ section.label }}</div>

      <ng-container *ngFor="let item of section.items">

        <!-- Item principal -->
        <div class="sb-item"
             [class.active]="isActive(item.route)"
             (click)="navigate(item.route)">
          <svg class="sb-icon" width="15" height="15" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
            <ng-container [ngSwitch]="item.icon">
              <ng-container *ngSwitchCase="'grid'">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
              </ng-container>
              <ng-container *ngSwitchCase="'map'">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </ng-container>
              <ng-container *ngSwitchCase="'tool'">
                <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
              </ng-container>
              <ng-container *ngSwitchCase="'users'">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
              </ng-container>
              <ng-container *ngSwitchCase="'user'">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </ng-container>
              <ng-container *ngSwitchCase="'monitor'">
                <rect x="2" y="3" width="20" height="14" rx="2"/>
                <line x1="8" y1="21" x2="16" y2="21"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
              </ng-container>
              <ng-container *ngSwitchCase="'book'">
                <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
              </ng-container>
              <ng-container *ngSwitchCase="'cpu'">
                <rect x="4" y="4" width="16" height="16" rx="2"/>
                <rect x="9" y="9" width="6" height="6"/>
                <line x1="9" y1="1" x2="9" y2="4"/>
                <line x1="15" y1="1" x2="15" y2="4"/>
                <line x1="9" y1="20" x2="9" y2="23"/>
                <line x1="15" y1="20" x2="15" y2="23"/>
                <line x1="20" y1="9" x2="23" y2="9"/>
                <line x1="20" y1="14" x2="23" y2="14"/>
                <line x1="1" y1="9" x2="4" y2="9"/>
                <line x1="1" y1="14" x2="4" y2="14"/>
              </ng-container>
              <ng-container *ngSwitchCase="'bar-chart'">
                <line x1="18" y1="20" x2="18" y2="10"/>
                <line x1="12" y1="20" x2="12" y2="4"/>
                <line x1="6" y1="20" x2="6" y2="14"/>
              </ng-container>
              <ng-container *ngSwitchCase="'key'">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </ng-container>
              <ng-container *ngSwitchCase="'settings'">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
              </ng-container>
              <ng-container *ngSwitchCase="'calendar'">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </ng-container>
              <ng-container *ngSwitchDefault>
                <circle cx="12" cy="12" r="3"/>
              </ng-container>
            </ng-container>
          </svg>
          {{ item.label }}
          <span class="sb-badge" *ngIf="item.badge"
                [class.badge-coral]="item.badgeColor === 'coral'"
                [class.badge-teal]="item.badgeColor === 'teal'">
            {{ item.badge }}
          </span>
        </div>

        <!-- ✅ Sous-items juste après leur parent -->
        <ng-container *ngIf="item.children && item.children.length > 0">
          <div class="sb-subitem"
               *ngFor="let child of item.children"
               [class.active]="isActive(child.route)"
               (click)="navigate(child.route)">
            <svg class="sb-icon" width="15" height="15" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
              <ng-container [ngSwitch]="child.icon">
                <ng-container *ngSwitchCase="'qr'">
                  <rect x="3" y="3" width="7" height="7"/>
                  <rect x="14" y="3" width="7" height="7"/>
                  <rect x="3" y="14" width="7" height="7"/>
                  <path d="M14 14h3v3M17 20h3M20 17v3"/>
                </ng-container>
                <ng-container *ngSwitchCase="'suggestions'">
                  <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                </ng-container>
                <ng-container *ngSwitchCase="'handshake'">
                  <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                </ng-container>
                <ng-container *ngSwitchDefault>
                  <circle cx="12" cy="12" r="3"/>
                </ng-container>
              </ng-container>
            </svg>
            {{ child.label }}
          </div>
        </ng-container>

      </ng-container>
    </div>
  </nav>

  <!-- ══ User drop-up ══════════════════════════════════════ -->
  <div class="sb-user-wrap">

    <!-- Menu drop-up -->
    <div class="sb-dropup" [class.visible]="userMenuOpen">

      <div class="sdu-header">
        <div class="sdu-av">{{ userInitials }}</div>
        <div>
          <div class="sdu-name">{{ currentUser?.nom ?? 'Admin' }}</div>
          <div class="sdu-email">{{ currentUser?.email }}</div>
        </div>
      </div>

      <div class="sdu-divider"></div>

      <button class="sdu-item" (click)="navigateAndClose('/user/profile')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Mon profil
      </button>

      <button class="sdu-item" (click)="navigateAndClose('/admin/settings')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
        </svg>
        Paramètres
      </button>

      <div class="sdu-divider"></div>

      <button class="sdu-item sdu-logout" (click)="logout()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Se déconnecter
      </button>

    </div>

    <!-- Trigger -->
    <div class="sb-user" (click)="toggleUserMenu()">
      <div class="sb-user-av">{{ userInitials }}</div>
      <div class="sb-user-dot"></div>
      <div style="flex:1;min-width:0">
        <div class="sb-user-name">{{ currentUser?.nom ?? 'Admin' }}</div>
        <div class="sb-user-role">{{ userRoleLabel }}</div>
      </div>
      <svg width="12" height="12" fill="none" stroke="rgba(255,255,255,.4)"
           stroke-width="2" viewBox="0 0 24 24"
           [style.transform]="userMenuOpen ? 'rotate(180deg)' : 'rotate(0)'"
           style="transition:transform .2s;flex-shrink:0;margin-left:4px">
        <polyline points="18 15 12 9 6 15"/>
      </svg>
    </div>

  </div>
</aside>
