<aside class="admin-sidebar">
  <!-- Logo -->
  <div class="sb-logo">
    <div class="sb-logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C8.134 2 5 5.134 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.866-3.134-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z" fill="white"/>
      </svg>
    </div>
    <span class="sb-logo-text">Madina</span>
    <span class="sb-admin-badge">Admin</span>
  </div>

  <!-- Nav -->
  <nav class="sb-nav">
    <div class="sb-section" *ngFor="let section of sections">
      <div class="sb-section-label">{{ section.label }}</div>

      <div class="sb-item"
           *ngFor="let item of section.items"
           [class.active]="isActive(item.route)"
           (click)="navigate(item.route)">

        <!-- Icon -->
        <svg class="sb-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
          <ng-container [ngSwitch]="item.icon">
            <ng-container *ngSwitchCase="'grid'"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></ng-container>
            <ng-container *ngSwitchCase="'map'"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></ng-container>
            <ng-container *ngSwitchCase="'tool'"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></ng-container>
            <ng-container *ngSwitchCase="'users'"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></ng-container>
            <ng-container *ngSwitchCase="'user'"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></ng-container>
            <ng-container *ngSwitchCase="'monitor'"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></ng-container>
            <ng-container *ngSwitchCase="'book'"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></ng-container>
            <ng-container *ngSwitchCase="'cpu'"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></ng-container>
            <ng-container *ngSwitchCase="'bar-chart'"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></ng-container>
            <ng-container *ngSwitchDefault><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></ng-container>
          </ng-container>
        </svg>

        {{ item.label }}

        <span class="sb-badge" *ngIf="item.badge"
              [class.badge-coral]="item.badgeColor === 'coral'"
              [class.badge-teal]="item.badgeColor === 'teal'">
          {{ item.badge }}
        </span>
      </div>
    </div>
  </nav>

  <!-- User -->
  <div class="sb-user" (click)="sound.nav()">
    <div class="sb-user-av">AM</div>
    <div class="sb-user-dot"></div>
    <div>
      <div class="sb-user-name">Ahmed Mansouri</div>
      <div class="sb-user-role">Super Admin</div>
    </div>
  </div>
</aside>
