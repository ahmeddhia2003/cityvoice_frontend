<div class="choix-page">

  <!-- Back link -->
  <a routerLink="/signaler" class="choix-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Retour aux signalements
  </a>

  <!-- Header -->
  <div class="choix-header">
    <div class="choix-header__icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
    </div>
    <h1 class="choix-header__title">Nouveau signalement</h1>
    <p class="choix-header__sub">Choisissez comment vous souhaitez signaler le problème</p>
  </div>

  <!-- Cards -->
  <div class="choix-cards">

    <!-- Carte Formulaire -->
    <button class="choix-card choix-card--form" (click)="goForm()">
      <div class="choix-card__bg-shape"></div>

      <div class="choix-card__icon-wrap">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>

      <div class="choix-card__content">
        <span class="choix-card__label">Formulaire</span>
        <h2 class="choix-card__title">Remplir le formulaire</h2>
        <p class="choix-card__desc">
          Décrivez le problème étape par étape, ajoutez une photo et précisez la localisation.
        </p>

        <ul class="choix-card__points">
          <li>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Ajout de photo ou vidéo
          </li>
          <li>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Localisation GPS précise
          </li>
          <li>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Aide IA optionnelle
          </li>
        </ul>
      </div>

      <div class="choix-card__arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </div>

      <span class="choix-card__badge">Recommandé</span>
    </button>

    <!-- Diviseur -->
    <div class="choix-divider">
      <span>ou</span>
    </div>

    <!-- Carte Vocal -->
    <button class="choix-card choix-card--voice" (click)="goVoice()">
      <div class="choix-card__bg-shape"></div>

      <div class="choix-card__icon-wrap">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>

      <div class="choix-card__content">
        <span class="choix-card__label">Vocal</span>
        <h2 class="choix-card__title">Appel vocal guidé</h2>
        <p class="choix-card__desc">
          Parlez directement au micro — le système transcrit votre description et crée le signalement automatiquement.
        </p>

        <ul class="choix-card__points">
          <li>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Guidage vocal étape par étape
          </li>
          <li>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Transcription automatique
          </li>
          <li>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Création instantanée
          </li>
        </ul>

        <!-- Flow steps -->
        <div class="choix-card__flow">
          <span class="flow-step">🎙️ Décrire</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
          <span class="flow-step">📍 Localiser</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
          <span class="flow-step">✅ Créé</span>
        </div>
      </div>

      <div class="choix-card__arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </div>
    </button>

  </div><!-- /cards -->
</div>
