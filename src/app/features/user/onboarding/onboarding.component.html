<div class="onboarding-widget" *ngIf="visible" [class.minimized]="minimized">

  <!-- Header -->
  <div class="ow-header" (click)="toggle()">
    <div class="ow-header-left">
      <div class="ow-emoji">🚀</div>
      <div>
        <div class="ow-title">Prise en main</div>
        <div class="ow-sub" *ngIf="!minimized">
          {{ doneCount }}/{{ steps.length }} étapes complétées
        </div>
      </div>
    </div>
    <div class="ow-header-right">
      <div class="ow-progress-circle" *ngIf="minimized">
        <svg viewBox="0 0 36 36" width="36" height="36">
          <circle cx="18" cy="18" r="15" fill="none"
                  stroke="rgba(255,255,255,.15)" stroke-width="3"/>
          <circle cx="18" cy="18" r="15" fill="none"
                  stroke="#E8532A" stroke-width="3"
                  stroke-dasharray="94.2"
                  [attr.stroke-dashoffset]="94.2 - (94.2 * progress / 100)"
                  stroke-linecap="round"
                  style="transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset .5s"/>
          <text x="18" y="22" text-anchor="middle"
                fill="white" font-size="9" font-weight="700">
            {{ progress }}%
          </text>
        </svg>
      </div>
      <button class="ow-chevron">
        <svg width="14" height="14" fill="none" stroke="currentColor"
             stroke-width="2.5" viewBox="0 0 24 24">
          <polyline [attr.points]="minimized ? '6 9 12 15 18 9' : '18 15 12 9 6 15'"/>
        </svg>
      </button>
      <button class="ow-close" (click)="$event.stopPropagation(); dismiss()">
        <svg width="13" height="13" fill="none" stroke="currentColor"
             stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Body -->
  <div class="ow-body" *ngIf="!minimized">

    <!-- Progress bar -->
    <div class="ow-prog-bar">
      <div class="ow-prog-fill" [style.width.%]="progress"></div>
    </div>

    <!-- All done -->
    <div class="ow-done" *ngIf="allDone">
      <span style="font-size:28px">🎉</span>
      <div>
        <div style="font-weight:700;color:#0C1F3F">Félicitations !</div>
        <div style="font-size:12px;color:#9CA3AF">Vous maîtrisez CityVoice</div>
      </div>
    </div>

    <!-- Steps -->
    <div class="ow-steps" *ngIf="!allDone">
      <div class="ow-step"
           *ngFor="let step of steps"
           [class.ow-step--done]="step.done">

        <div class="ow-step-icon">
          <span *ngIf="!step.done">{{ step.icon }}</span>
          <svg *ngIf="step.done" width="16" height="16" fill="none"
               stroke="#0D9B76" stroke-width="2.5" viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>

        <div class="ow-step-text">
          <div class="ow-step-title">{{ step.title }}</div>
          <div class="ow-step-desc">{{ step.desc }}</div>
        </div>

        <button class="ow-step-btn"
                *ngIf="!step.done"
                (click)="go(step)">
          {{ step.btnLabel }}
          <svg width="11" height="11" fill="none" stroke="currentColor"
               stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>

        <span class="ow-done-badge" *ngIf="step.done">✓</span>

      </div>
    </div>

  </div>
</div>
