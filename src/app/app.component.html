<!-- Loader — premier chargement uniquement -->
<app-loader
  *ngIf="showLoader"
  (loadingComplete)="onLoadingComplete()">
</app-loader>

<!-- Shell principal — navbar + footer masqués sur /admin -->
<div [style.opacity]="showLoader ? '0' : '1'"
     [style.transition]="'opacity 0.3s ease'">

  <!-- Navbar et footer UNIQUEMENT hors admin -->
  <ng-container *ngIf="!isAdminRoute">
    <app-navbar></app-navbar>
  </ng-container>

  <main>
    <router-outlet></router-outlet>
  </main>

  <ng-container *ngIf="!isAdminRoute">
    <app-footer></app-footer>
  </ng-container>
</div>
